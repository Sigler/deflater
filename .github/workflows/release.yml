name: Release

# Pushing a tag like v0.2.0 builds the exe and publishes a GitHub
# Release with it attached. Use scripts/release.ps1 to cut one.
on:
  push:
    tags: ["v*"]

permissions:
  contents: write

jobs:
  release:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.26"

      - uses: actions/setup-node@v4
        with:
          node-version: "22"

      # The tag must match the version compiled into the app, so a release
      # can never ship a binary that reports a different version.
      - name: Check tag matches app version
        run: |
          $tag = "${{ github.ref_name }}".TrimStart('v')
          $app = (Select-String -Path main.go -Pattern 'const appVersion = "([^"]+)"').Matches.Groups[1].Value
          if ($tag -ne $app) { throw "tag $tag does not match appVersion $app" }

      # frontend/dist is gitignored build output, but the Go embed needs
      # it to exist before the frontend has ever been built.
      - name: Stub frontend dist for Go embed
        run: |
          New-Item -ItemType Directory -Force frontend/dist | Out-Null
          Set-Content frontend/dist/index.html "placeholder"

      - name: Frontend checks
        working-directory: frontend
        run: |
          npm ci
          npm run lint
          npm test

      - name: Go checks
        run: go test ./...

      - name: Build
        run: |
          go install github.com/wailsapp/wails/v2/cmd/wails@v2.13.0
          wails build

      # Publish a checksum alongside the exe so users can verify their
      # download with Get-FileHash.
      - name: Checksum
        run: |
          $h = (Get-FileHash build/bin/Deflater.exe -Algorithm SHA256).Hash
          "$h  Deflater.exe" | Out-File -Encoding ascii build/bin/SHA256SUMS.txt
          Write-Host "SHA256: $h"

      - name: Publish release
        env:
          GH_TOKEN: ${{ github.token }}
        run: >
          gh release create ${{ github.ref_name }}
          build/bin/Deflater.exe build/bin/SHA256SUMS.txt
          --generate-notes
