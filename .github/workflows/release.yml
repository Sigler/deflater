name: Release

# Pushing a tag like v0.2.0 builds the exe and publishes a GitHub
# Release with it attached. Use scripts/release.ps1 to cut one.
on:
  push:
    tags: ["v*"]

permissions:
  contents: write

jobs:
  release:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.26"

      - uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Test
        run: go test ./...

      - name: Build
        run: |
          go install github.com/wailsapp/wails/v2/cmd/wails@latest
          wails build

      - name: Publish release
        uses: softprops/action-gh-release@v2
        with:
          files: build/bin/Deflater.exe
          generate_release_notes: true
