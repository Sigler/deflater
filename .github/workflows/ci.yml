name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.26"

      - uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Frontend checks
        working-directory: frontend
        run: |
          npm ci
          npm run lint
          npm test

      - name: Go checks
        run: |
          go vet ./...
          go test ./...

      - name: Build
        run: |
          go install github.com/wailsapp/wails/v2/cmd/wails@latest
          wails build

      - name: Frontend typecheck (needs generated bindings)
        working-directory: frontend
        run: npm run check

      - uses: actions/upload-artifact@v4
        with:
          name: Deflater
          path: build/bin/Deflater.exe
